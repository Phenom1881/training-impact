<!-- UWSWVA Preparedness Impact Block — paste into Drupal Custom Block (Full HTML format) -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap');
  .uwswva-impact { font-family: 'DM Sans', sans-serif; max-width: 720px; margin: 0 auto; }
  .uwswva-impact-card { background: #fff; border-radius: 18px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,51,102,0.08); border: 1px solid #e0e8f0; }
  .uwswva-impact-header { background: linear-gradient(135deg, #003366 0%, #1D6FB5 100%); padding: 22px 28px; display: flex; align-items: center; justify-content: space-between; }
  .uwswva-impact-header small { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.65); font-weight: 700; }
  .uwswva-impact-header h3 { font-size: 20px; font-weight: 900; color: #fff; margin: 2px 0 0; letter-spacing: -0.01em; }
  .uwswva-impact-grid { display: flex; flex-wrap: wrap; padding: 16px 8px 24px; }
  .uwswva-stat { text-align: center; flex: 1 1 140px; padding: 20px 12px; }
  .uwswva-stat-icon { font-size: 28px; margin-bottom: 8px; }
  .uwswva-stat-value { font-size: 40px; font-weight: 900; color: #003366; line-height: 1; }
  .uwswva-stat-label { font-size: 13px; font-weight: 700; color: #5a7a94; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
  .uwswva-impact-footer { background: #f6f9fc; padding: 14px 28px; border-top: 1px solid #e8ecf0; text-align: center; font-size: 13px; color: #8a9aaa; font-weight: 600; }
</style>

<div class="uwswva-impact">
